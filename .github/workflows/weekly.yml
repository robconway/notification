name: Weekly Planning Check

on:
  schedule:
    # Every Monday at 08:00 UTC (09:00 BST / 08:00 GMT)
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print matches, skip email)'
        type: boolean
        default: false
      dump_html:
        description: 'Save raw HTML to artifacts for debugging'
        type: boolean
        default: false
      strategy:
        description: 'Fetch strategy'
        type: choice
        options: [auto, '1', '2']
        default: auto

jobs:
  check-planning:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated state.json

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: playwright install chromium --with-deps

      - name: Run planning checker
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          PORTAL_USERNAME: ${{ secrets.PORTAL_USERNAME }}
          PORTAL_PASSWORD: ${{ secrets.PORTAL_PASSWORD }}
          RADIUS_MILES: ${{ vars.RADIUS_MILES || '1' }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.dump_html }}" = "true" ]; then ARGS="$ARGS --dump-html"; fi
          if [ -n "${{ inputs.strategy }}" ]; then ARGS="$ARGS --strategy ${{ inputs.strategy }}"; fi
          python notify.py $ARGS

      - name: Upload debug HTML (if requested)
        if: ${{ inputs.dump_html == true }}
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: debug_*.html
          if-no-files-found: ignore

      - name: Commit updated state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          if git diff --staged --quiet; then
            echo "state.json unchanged – nothing to commit"
          else
            git commit -m "chore: update seen-applications state [skip ci]"
            git pull --rebase origin main
            git push origin HEAD
          fi
